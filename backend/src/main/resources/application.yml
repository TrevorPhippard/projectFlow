spring:
  application:
    name: projectflow

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/projectflow}
    username: ${DB_USERNAME:projectflow}
    password: ${DB_PASSWORD:projectflow123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_FILE_SIZE:5MB}
      max-request-size: ${MAX_REQUEST_SIZE:10MB}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - email
              - profile
            redirect-uri: "${APP_URL:http://localhost:8080}/oauth2/callback/{registrationId}"

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    access-token-expiration: ${JWT_ACCESS_EXPIRY:900000}
    refresh-token-expiration: ${JWT_REFRESH_EXPIRY:604800000}
  upload:
    directory: ${UPLOAD_DIR:./uploads}
    avatar-directory: ${UPLOAD_DIR:./uploads}/avatars
    allowed-types: image/jpeg,image/png,image/gif,image/webp
    max-size: 5242880
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200,http://localhost:80}
  oauth2:
    authorized-redirect-uris: ${OAUTH2_REDIRECT_URIS:http://localhost:4200/oauth2/redirect}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.projectflow: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:./logs/projectflow.log}
