<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ProjectFlow</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="ProjectFlow - Team Project Management">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    #initial-loader {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #f8fafc; z-index: 9999; flex-direction: column; gap: 1rem;
    }
    .init-logo { font-size: 2rem; font-weight: 800; color: #6366f1; }
    .init-spinner {
      width: 32px; height: 32px; border: 3px solid #e2e8f0;
      border-top-color: #6366f1; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="initial-loader">
    <div class="init-logo">ProjectFlow</div>
    <div class="init-spinner"></div>
  </div>
  <app-root></app-root>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const loader = document.getElementById('initial-loader');
        if (loader) loader.style.display = 'none';
      }, 500);
    });
  </script>
</body>
</html>
