version: '3.9'

services:
  # ─── PostgreSQL Database ───────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: projectflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-projectflow}
      POSTGRES_USER: ${DB_USERNAME:-projectflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-projectflow123}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-projectflow} -d ${DB_NAME:-projectflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - projectflow-net

  # ─── Spring Boot Backend ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projectflow-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-projectflow}
      DB_USERNAME: ${DB_USERNAME:-projectflow}
      DB_PASSWORD: ${DB_PASSWORD:-projectflow123}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-900000}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-604800000}
      # Server
      SERVER_PORT: 8080
      # OAuth2 (optional)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APP_URL: ${APP_URL:-http://localhost:8080}
      OAUTH2_REDIRECT_URIS: ${OAUTH2_REDIRECT_URIS:-http://localhost/oauth2/redirect}
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:4200,http://frontend}
      # File upload
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: 5MB
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - projectflow-net

  # ─── Angular Frontend (Nginx) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: projectflow-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - projectflow-net

# ─── Volumes ────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local

# ─── Networks ───────────────────────────────────────────────────
networks:
  projectflow-net:
    driver: bridge
